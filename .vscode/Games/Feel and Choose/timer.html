<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Timer</title>
    
    <!-- Link to CSS file -->
    <link rel="stylesheet" href="css/timer.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="timer-container">
        
        <!-- Simple Header with just buttons -->
        <header class="timer-header">
    <button class="settings-btn" id="settingsToggle">⚙️</button>
    <!-- Change this from onclick="window.location.href='index.html'" -->
    <button class="back-btn" onclick="window.location.href='index.html'">←</button>
</header>

        <!-- Main content - just stars and star button -->
        <main class="timer-main">
            
            <!-- Big Stars Container -->
            <div class="stars-container" id="starsContainer">
                <!-- Stars will be generated here by JavaScript -->
            </div>

            <!-- Big Star Button -->
            <button class="star-button" id="nextStarBtn" disabled>
                ⭐
            </button>

            <!-- Counter (small and subtle) -->
            <div class="star-counter">
                <span id="starsEarned">0</span>/<span id="totalStars">5</span>
            </div>
        </main>

        <!-- Settings Panel (hidden by default) -->
        <div class="settings-panel" id="settingsPanel" style="display: none;">
            <h3 class="settings-title">Settings</h3>
            
            <div class="setting-group">
                <label>Total Stars:</label>
                <select id="totalStarsSelect">
                    <option value="3">3 stars</option>
                    <option value="4">4 stars</option>
                    <option value="5" selected>5 stars</option>
                </select>
            </div>
            
            <div class="setting-group">
                <label>Star Color:</label>
                <div class="color-options">
                    <button class="color-btn" data-color="#FFD700" style="background: #FFD700;">⭐</button>
                    <button class="color-btn" data-color="#C0C0C0" style="background: #C0C0C0;">⭐</button>
                    <button class="color-btn" data-color="#CD7F32" style="background: #CD7F32;">⭐</button>
                    <button class="color-btn" data-color="#FF69B4" style="background: #FF69B4;">⭐</button>
                </div>
            </div>
            
            <div class="setting-group">
                <label>Completion Message:</label>
                <input type="text" id="completionMessage" value="Great job! Task complete! ✨">
            </div>
            
            <button class="close-settings" id="closeSettings">Done</button>
        </div>
    </div>

    <!-- Completion Popup -->
    <div class="popup-overlay" id="popupOverlay" style="display: none;">
        <div class="popup-content">
            <div class="popup-stars" id="popupStars">⭐⭐⭐⭐⭐</div>
            <h2 class="popup-message" id="popupMessage">Great job! Task complete! ✨</h2>
            <div class="popup-buttons">
                <button class="popup-btn" id="popupResetBtn">🔄 Again</button>
                <button class="popup-btn" onclick="window.location.href='index.html'">🏠 Home</button>
            </div>
        </div>
    </div>

    <!-- Flying Stars Container -->
    <div class="flying-stars-container" id="flyingStarsContainer"></div>

    <!-- Link to JavaScript -->
    <script src="js/timer.js"></script>
</body>
</html>
