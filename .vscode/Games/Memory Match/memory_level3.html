<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Memory Game - Level 3</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Memory game specific styles */
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px; /* Reduced gap to save space */
            justify-content: center;
            margin: 10px 0; /* Reduced top/bottom margin */
            position: relative;
        }
        .card.memory-card {
            width: 75px; /* Reduced from 100px */
            height: 105px; /* Reduced from 140px */
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.3s;
        }
        .card.memory-card.flip {
            transform: rotateY(180deg);
        }
        .card.memory-card .front, .card.memory-card .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem; /* Reduced font size to fit smaller cards */
            font-weight: 900;
            background-size: cover;
            background-position: center;
        }
        .card.memory-card .front {
            transform: rotateY(180deg);
            color: black; 
        }
        .card.memory-card .back {
            background-image: url('image sources/face_down.png');
            transform: rotateY(0deg);
        }
        .card.memory-card.shake {
            animation: shake 0.3s;
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
        .face-down-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 112px; /* Scaled down proportionally */
            height: 157px; /* Scaled down proportionally */
            background-image: url('image sources/face_down.png');
            background-size: cover;
            background-position: center;
            border-radius: 10px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }
        .face-down-center.show {
            opacity: 1;
        }
        .rematch-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #D2B48C;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: white;
        }
        .game-area {
            position: relative;
            min-height: 400px; /* Reduced min-height to match smaller grid */
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <button class="back-btn" onclick="location.href='index.html'">Back</button>
            <div class="score">Memory Score: <span id="memoryScore">0</span></div>
        </div>
        <div class="game-area" id="gameArea">
            <div class="face-down-center" id="faceDownCenter"></div>
            <div class="memory-grid" id="memoryGrid"></div>
            <button class="rematch-btn" id="rematchBtn">Rematch</button>
        </div>
    </div>
    
    <script>
        // Level 3 configuration
        const levelConfig = {
            level: 3,
            suit: 'clubs',   // Switched to clubs for visual variety in Level 3
            gridCols: 6,
            gridRows: 6,
            totalCards: 36,
            maxNumber: 18,
            points: 150      // Increased points for completing the 36-card grid
        };
    </script>
    
    <script src="js/memoryGame.js"></script>

    <script>
        function animateCardsFromCenter() {
            animationInProgress = true;
            const faceDown = document.getElementById('faceDownCenter');
            const faceDownRect = faceDown.getBoundingClientRect();
            const gameArea = document.getElementById('gameArea');
            const gameAreaRect = gameArea.getBoundingClientRect();

            // Set each card to absolute position at center
            cards.forEach(card => {
                card.style.position = 'absolute';
                card.style.left = (faceDownRect.left - gameAreaRect.left) + 'px';
                card.style.top = (faceDownRect.top - gameAreaRect.top) + 'px';
                card.style.width = faceDownRect.width + 'px';
                card.style.height = faceDownRect.height + 'px';
                card.style.opacity = '1';
                card.style.transition = 'all 0.5s ease';
            });

            // After a tiny delay, start moving to grid positions
            setTimeout(() => {
                const grid = document.getElementById('memoryGrid');
                const gridRect = grid.getBoundingClientRect();
                
                // Use the new smaller dimensions for the animation target
                const cellWidth = 75;  
                const cellHeight = 105; 
                const gap = 8;        

                cards.forEach((card, index) => {
                    const col = index % levelConfig.gridCols;
                    const row = Math.floor(index / levelConfig.gridCols);
                    const targetLeft = gridRect.left + col * (cellWidth + gap) - gameAreaRect.left;
                    const targetTop = gridRect.top + row * (cellHeight + gap) - gameAreaRect.top;

                    card.style.left = targetLeft + 'px';
                    card.style.top = targetTop + 'px';
                    card.style.width = cellWidth + 'px';
                    card.style.height = cellHeight + 'px';
                });

                // After animation ends, remove absolute positioning
                setTimeout(() => {
                    cards.forEach(card => {
                        card.style.position = '';
                        card.style.left = '';
                        card.style.top = '';
                        card.style.width = '';
                        card.style.height = '';
                        card.style.transition = '';
                    });
                    faceDown.classList.remove('show');
                    animationInProgress = false;
                    gameActive = true; 
                    console.log('Game active');
                }, 500); // match transition duration
            }, 50);
        }
    </script>
</body>
</html>
