<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTT - My Voice AAC</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="aac-viewport">
        <div class="aac-card">
            
            <header class="sentence-bar">
                <div id="sentence-display" class="sentence-list"></div>
                <div class="bar-actions">
                    <button class="speak-btn" onclick="speakSentence()">📣 SPEAK</button>
                    <button class="delete-btn" onclick="clearSentence()">✖</button>
                </div>
            </header>

            <main class="aac-grid">
                <button class="aac-btn yellow" onclick="add('I want', 'mdi:account')">
                    <img src="https://api.iconify.design/mdi/account.svg"><span>I WANT</span>
                </button>
                <button class="aac-btn yellow" onclick="add('Go', 'mdi:walk')">
                    <img src="https://api.iconify.design/mdi/walk.svg"><span>GO</span>
                </button>
                <button class="aac-btn yellow" onclick="add('Play', 'mdi:controller-classic')">
                    <img src="https://api.iconify.design/mdi/controller-classic.svg"><span>PLAY</span>
                </button>
                <button class="aac-btn yellow" onclick="add('Help', 'mdi:hand-front-left')">
                    <img src="https://api.iconify.design/mdi/hand-front-left.svg"><span>HELP</span>
                </button>

                <button class="aac-btn orange" onclick="add('Big', 'mdi:arrow-expand-all')">
                    <img src="https://api.iconify.design/mdi/arrow-expand-all.svg"><span>BIG</span>
                </button>
                <button class="aac-btn orange" onclick="add('Small', 'mdi:arrow-collapse-all')">
                    <img src="https://api.iconify.design/mdi/arrow-collapse-all.svg"><span>SMALL</span>
                </button>
                <button class="aac-btn orange" onclick="add('More', 'mdi:plus-circle')">
                    <img src="https://api.iconify.design/mdi/plus-circle.svg"><span>MORE</span>
                </button>
                <button class="aac-btn orange" onclick="add('Stop', 'mdi:stop-circle')">
                    <img src="https://api.iconify.design/mdi/stop-circle.svg"><span>STOP</span>
                </button>

                <button class="aac-btn blue" onclick="add('Water', 'mdi:water')">
                    <img src="https://api.iconify.design/mdi/water.svg"><span>WATER</span>
                </button>
                <button class="aac-btn blue" onclick="add('Juice', 'mdi:cup')">
                    <img src="https://api.iconify.design/mdi/cup.svg"><span>JUICE</span>
                </button>
                <button class="aac-btn blue" onclick="add('Snack', 'mdi:food-apple')">
                    <img src="https://api.iconify.design/mdi/food-apple.svg"><span>SNACK</span>
                </button>
                <button class="aac-btn blue" onclick="add('Toilet', 'mdi:toilet')">
                    <img src="https://api.iconify.design/mdi/toilet.svg"><span>TOILET</span>
                </button>

                <button class="aac-btn green" onclick="add('Swing', 'mdi:air-filter')">
                    <img src="https://api.iconify.design/mdi/air-filter.svg"><span>SWING</span>
                </button>
                <button class="aac-btn green" onclick="add('Trampoline', 'mdi:bounce-check')">
                    <img src="https://api.iconify.design/mdi/bounce-check.svg"><span>BOUNCE</span>
                </button>
                <button class="aac-btn green" onclick="add('Outside', 'mdi:tree')">
                    <img src="https://api.iconify.design/mdi/tree.svg"><span>OUTSIDE</span>
                </button>
                <button class="aac-btn green" onclick="add('Music', 'mdi:music')">
                    <img src="https://api.iconify.design/mdi/music.svg"><span>MUSIC</span>
                </button>
            </main>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
