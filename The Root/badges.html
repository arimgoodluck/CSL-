<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASTT | Badge & Student Creator</title>
    <link rel="stylesheet" href="badge-style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <div class="admin-panel" style="text-align: center; padding: 40px; background: white;">
        <h2>Create New Student</h2>
        <input type="text" id="fn" placeholder="First Name">
        <input type="text" id="sn" placeholder="Surname">
        <input type="text" id="pw" placeholder="Password">
        <button onclick="createStudent()" style="background:#2ecc71; color:white; padding:10px 20px; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">Create & Save</button>
        <p id="statusMsg" style="margin-top:10px; font-size:0.8rem;"></p>
    </div>

    <div id="badgeGrid" style="display: flex; flex-wrap: wrap; gap: 20px; padding: 20px;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMae--S9VJmS1MiYn5fa8XOarJYpiaDkM",
            authDomain: "digi-astt.firebaseapp.com",
            projectId: "digi-astt",
            storageBucket: "digi-astt.firebasestorage.app",
            messagingSenderId: "1046079306729",
            appId: "1:1046079306729:web:0d80aacace0a56d8366978"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const animals = ['Lion', 'Panda', 'Tiger', 'Dolphin', 'Koala', 'Fox', 'Owl', 'Zebra'];

        window.createStudent = async () => {
            const first = document.getElementById('fn').value.trim();
            const last = document.getElementById('sn').value.trim();
            const pass = document.getElementById('pw').value.trim();
            const status = document.getElementById('statusMsg');

            if (!first || !last || !pass) return alert("Fill everything!");

            const systemID = `${first.toLowerCase()}.${last.toLowerCase()}`;
            const alias = animals[Math.floor(Math.random() * animals.length)];
            
            status.innerText = "Saving to Firebase...";

            try {
                // AUTO-SAVE TO FIREBASE
                await setDoc(doc(db, "students", systemID), {
                    full_name: `${first} ${last}`,
                    name_alias: alias,
                    password: pass,
                    total_stars: 0,
                    avatar_url: `https://api.dicebear.com/7.x/bottts/svg?seed=${alias}`
                });

                status.innerText = "Success! Badge generated below.";
                renderBadge(systemID, first, last, alias);
                
                // Clear inputs
                document.getElementById('fn').value = ""; document.getElementById('sn').value = ""; document.getElementById('pw').value = "";
            } catch (e) {
                status.innerText = "Error: " + e.message;
            }
        };

        function renderBadge(id, f, l, alias) {
            const container = document.getElementById('badgeGrid');
            const cardId = `qr-${Date.now()}`;
            const card = document.createElement('div');
            card.className = 'badge-card'; // Uses your existing CSS
            card.innerHTML = `
                <div style="border:2px solid #2c3e50; padding:20px; border-radius:15px; width:250px; text-align:center; background:white;">
                    <h3 style="margin:0">${f} ${l}</h3>
                    <p style="color:#27ae60; font-weight:bold;">${alias}</p>
                    <div id="${cardId}" style="margin:15px auto; width:128px;"></div>
                    <small style="color:#bdc3c7">${id}</small>
                </div>
            `;
            container.appendChild(card);
            new QRCode(document.getElementById(cardId), { text: id, width: 128, height: 128 });
        }
    </script>
</body>
</html>
