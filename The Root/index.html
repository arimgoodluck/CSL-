<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGI-ASTT | Student Hub</title>
    <link rel="stylesheet" href="main-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

    <nav class="navbar">
        <div class="logo">DIGI-ASTT</div>
        <div class="nav-right">
            <a href="login.html" class="admin-link"><i class="fas fa-user-shield"></i> Aide Login</a>
        </div>
    </nav>

    <section id="loginSection" class="hero">
        <h1>Welcome to the Digital Hub</h1>
        <p>Scan your badge or type your name to start!</p>

        <div class="login-container">
            <div class="login-box">
                <h3><i class="fas fa-qrcode"></i> Badge Scan</h3>
                <div id="reader"></div>
                <p id="scanStatus">Ready for your badge...</p>
            </div>

            <div class="login-box">
                <h3><i class="fas fa-keyboard"></i> Manual Login</h3>
                <form id="studentLoginForm">
                    <input type="text" id="stuUser" placeholder="firstname.surname" required>
                    <input type="password" id="stuPass" placeholder="Password" required>
                    <button type="submit" class="login-btn">Let's Go!</button>
                </form>
                <p id="loginError" style="color: #e74c3c; margin-top: 10px; font-size: 0.8rem;"></p>
            </div>
        </div>
    </section>

    <section id="gameSection" class="game-container" style="display: none;">
        <div class="student-profile-header">
            <div class="avatar-frame">
                <img id="activeAvatar" src="" alt="Spirit Animal">
            </div>
            <h2 id="welcomeMsg">Welcome back!</h2>
            <button onclick="logoutStudent()" class="switch-btn">Not you? Switch User</button>
        </div>

        <div class="game-grid">
            <div class="game-card math" onclick="location.href='math.html'">
                <div class="icon-box"><i class="fas fa-calculator"></i></div>
                <h3>Math Adventure</h3>
                <span class="btn-play">Play</span>
            </div>
            <div class="game-card aac" onclick="location.href='aac.html'">
                <div class="icon-box"><i class="fas fa-comment-dots"></i></div>
                <h3>Talk & Touch</h3>
                <span class="btn-play">Open</span>
            </div>
            <div class="game-card routine" onclick="location.href='routine.html'">
                <div class="icon-box"><i class="fas fa-tasks"></i></div>
                <h3>My Day</h3>
                <span class="btn-play">Start</span>
            </div>
            <div class="game-card sensory" onclick="location.href='sensory.html'">
                <div class="icon-box"><i class="fas fa-magic"></i></div>
                <h3>Relax Zone</h3>
                <span class="btn-play">Enter</span>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMae--S9VJmS1MiYn5fa8XOarJYpiaDkM",
            authDomain: "digi-astt.firebaseapp.com",
            projectId: "digi-astt",
            storageBucket: "digi-astt.firebasestorage.app",
            messagingSenderId: "1046079306729",
            appId: "1:1046079306729:web:0d80aacace0a56d8366978"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- SCANNER LOGIC ---
        const html5QrCode = new Html5Qrcode("reader");
        const qrConfig = { fps: 10, qrbox: { width: 200, height: 200 } };

        html5QrCode.start({ facingMode: "user" }, qrConfig, (decodedText) => {
            handleStudentLogin(decodedText, null, true); // True = Badge Scan (bypass password)
        });

        // --- MANUAL LOGIN LOGIC ---
        document.getElementById('studentLoginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('stuUser').value.toLowerCase();
            const pass = document.getElementById('stuPass').value;
            handleStudentLogin(user, pass, false);
        });

        async function handleStudentLogin(username, password, isBadge) {
            const docRef = doc(db, "students", username);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                
                // If manual login, check password
                if (!isBadge && data.password !== password) {
                    document.getElementById('loginError').innerText = "Wrong password!";
                    return;
                }

                // SUCCESS - Store session and update UI
                sessionStorage.setItem("activeStudent", username);
                sessionStorage.setItem("activeAlias", data.name_alias);
                
                showGameHub(data);
            } else {
                if(!isBadge) document.getElementById('loginError').innerText = "User not found!";
            }
        }

        function showGameHub(data) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('gameSection').style.display = 'block';
            document.getElementById('activeAvatar').src = data.avatar_url || `https://api.dicebear.com/7.x/bottts/svg?seed=${data.name_alias}`;
            document.getElementById('welcomeMsg').innerText = "Hello, " + (data.name_alias || "Learner") + "!";
            if(html5QrCode.isScanning) html5QrCode.stop();
        }

        window.logoutStudent = () => {
            sessionStorage.clear();
            location.reload();
        };
    </script>
</body>
</html>
