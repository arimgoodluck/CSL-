<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal | DIGI-ASTT</title>
    <link rel="stylesheet" href="admin-style.css">
    <style>
        /* Ensuring the form looks clean if your admin-style.css is minimal */
        .login-page {
            margin: 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #eee;
            border-radius: 10px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        button:disabled { background: #bdc3c7; }
        .back-link { display: block; margin-top: 20px; color: #7f8c8d; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body class="login-page">

    <div class="login-card">
        <h2>Staff Portal</h2>
        <p style="color: #7f8c8d; font-size: 0.9rem;">Sign in to view student progress</p>
        
        <form id="loginForm">
            <input type="email" id="email" placeholder="Staff Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="loginBtn">Login</button>
        </form>
        
        <p id="errorMessage" style="color: #e74c3c; margin-top: 15px; font-size: 0.85rem; height: 1rem;"></p>
        
        <a href="index.html" class="back-link">← Return to Student Hub</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMae--S9VJmS1MiYn5fa8XOarJYpiaDkM",
            authDomain: "digi-astt.firebaseapp.com",
            projectId: "digi-astt",
            storageBucket: "digi-astt.firebasestorage.app",
            messagingSenderId: "1046079306729",
            appId: "1:1046079306729:web:0d80aacace0a56d8366978"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMessage');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // UI Feedback
            loginBtn.innerText = "Authenticating...";
            loginBtn.disabled = true;
            errorMsg.innerText = "";

            const email = document.getElementById('email').value;
            const pw = document.getElementById('password').value;

            signInWithEmailAndPassword(auth, email, pw)
                .then(() => {
                    // Success!
                    window.location.href = "admin.html"; 
                })
                .catch((error) => {
                    // Handle Errors
                    loginBtn.innerText = "Login";
                    loginBtn.disabled = false;
                    
                    if (error.code === 'auth/invalid-credential') {
                        errorMsg.innerText = "Invalid email or password.";
                    } else if (error.code === 'auth/too-many-requests') {
                        errorMsg.innerText = "Too many attempts. Try again later.";
                    } else {
                        errorMsg.innerText = "Access Denied.";
                    }
                });
        });
    </script>
</body>
</html>
