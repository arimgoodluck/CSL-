<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aide Portal | DIGI-ASTT</title>
    <style>
        :root {
            --primary: #3498db;
            --secondary: #2c3e50;
            --bg: #f4f7f6;
            --white: #ffffff;
            --danger: #e74c3c;
            --accent: #f1c40f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--secondary);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 30px auto;
        }

        .btn-logout {
            background: var(--danger);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Student Grid */
        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .student-card {
            background: var(--white);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.2s;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .student-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .student-icon { font-size: 3.5rem; display: block; margin-bottom: 10px; }
        .student-name { font-size: 1.2rem; font-weight: bold; }

        /* Modal / Report Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--white);
            width: 90%;
            max-width: 650px;
            max-height: 85vh;
            border-radius: 25px;
            padding: 30px;
            position: relative;
            overflow-y: auto;
        }

        .stats-summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .stat-box {
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .usage-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .tag {
            background: #ebf5fb;
            color: var(--primary);
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
            border: none;
            background: none;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1 style="margin:0;">Aide Portal</h1>
            <p style="color:#7f8c8d;">Track student engagement and performance</p>
        </div>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>

    <div id="student-grid" class="student-grid">
        <p style="grid-column: 1/-1; text-align: center;">Connecting to database...</p>
    </div>

    <div id="report-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeReport()">&times;</button>
            <div id="report-content"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMae--S9VJmS1MiYn5fa8XOarJYpiaDkM",
            authDomain: "digi-astt.firebaseapp.com",
            projectId: "digi-astt",
            storageBucket: "digi-astt.firebasestorage.app",
            messagingSenderId: "1046079306729",
            appId: "1:1046079306729:web:0d80aacace0a56d8366978"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Security Check
        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "login.html";
            else loadStudentGrid();
        });

        // Load Grid
        async function loadStudentGrid() {
            const grid = document.getElementById('student-grid');
            try {
                const snapshot = await getDocs(collection(db, "students"));
                grid.innerHTML = "";
                snapshot.forEach(doc => {
                    const s = doc.data();
                    const card = document.createElement('div');
                    card.className = 'student-card';
                    card.onclick = () => showStudentReport(doc.id, s.full_name, s.name_alias);
                    card.innerHTML = `
                        <span class="student-icon">${s.name_alias || '👤'}</span>
                        <div class="student-name">${s.full_name}</div>
                        <div style="color:var(--accent); font-weight:bold; margin-top:5px;">⭐ ${s.total_stars || 0}</div>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) { grid.innerHTML = "Error: " + e.message; }
        }

        // Drill-down Logic
        window.showStudentReport = async (id, fullName, alias) => {
            const content = document.getElementById('report-content');
            document.getElementById('report-modal').style.display = 'flex';
            content.innerHTML = "<h3>Calculating stats...</h3>";

            try {
                const q = query(collection(db, "progress_logs"), where("studentID", "==", id), orderBy("timestamp", "desc"));
                const snap = await getDocs(q);

                let mathScores = [];
                let moods = [];
                let usage = {};
                let oneWeekAgo = new Date();
                oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);

                snap.forEach(doc => {
                    const data = doc.data();
                    const date = data.timestamp ? data.timestamp.toDate() : new Date();

                    // Math Tracking
                    if(data.game.toLowerCase().includes("math") && data.score) mathScores.push(Number(data.score));
                    // Mood Tracking
                    if(data.game === "Mood Check") moods.push(data.value);
                    // Usage Frequency (7 Days)
                    if(date > oneWeekAgo) usage[data.game] = (usage[data.game] || 0) + 1;
                });

                const mathAvg = mathScores.length ? (mathScores.reduce((a,b)=>a+b,0)/mathScores.length).toFixed(0) + "%" : "N/A";

                content.innerHTML = `
                    <div style="text-align:center;">
                        <span style="font-size:3rem;">${alias || '👤'}</span>
                        <h2>${fullName}</h2>
                        <p style="color:#7f8c8d; font-size:0.8rem;">${id}</p>
                    </div>

                    <div class="stats-summary">
                        <div class="stat-box" style="background:#ebf5fb;">
                            <small>Math Proficiency</small>
                            <div style="font-size:1.6rem; font-weight:bold; color:#2980b9;">${mathAvg}</div>
                        </div>
                        <div class="stat-box" style="background:#fef9e7;">
                            <small>Latest Mood</small>
                            <div style="font-size:1.6rem; font-weight:bold; color:#f39c12;">${moods[0] || '---'}</div>
                        </div>
                    </div>

                    <h4>Weekly Activity (Frequency)</h4>
                    ${Object.entries(usage).map(([game, count]) => `
                        <div class="usage-row">
                            <span>${game}</span>
                            <span class="tag">${count}x this week</span>
                        </div>
                    `).join('') || '<p>No activity in the last 7 days.</p>'}

                    <h4 style="margin-top:25px;">Recent Mood History</h4>
                    <p style="font-size:0.9rem; color:#7f8c8d;">${moods.slice(0,5).join(' → ') || 'No mood data recorded.'}</p>
                `;
            } catch (e) { 
                content.innerHTML = "Error: " + e.message + "<br><small>Tip: Check if Firestore indices are ready.</small>"; 
            }
        };

        window.closeReport = () => document.getElementById('report-modal').style.display = 'none';
        window.logout = () => signOut(auth).then(() => window.location.href = "login.html");
    </script>
</body>
</html>
